controller_manager:
  ros__parameters:
    update_rate: 500

    robot_joint_controller:
      type: robot_joint_controller/RobotJointControllerGroup
      joints:
        - fl_hip_joint
        - fl_thigh_joint
        - fl_knee_joint
        - fr_hip_joint
        - fr_thigh_joint
        - fr_knee_joint
        - hl_hip_joint
        - hl_thigh_joint
        - hl_knee_joint
        - hr_hip_joint
        - hr_thigh_joint
        - hr_knee_joint

