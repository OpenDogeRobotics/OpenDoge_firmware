# OpenDoge deploy runtime config — matched to UniLab Round 26 training.
# Units: rad, rad/s, Nm, second.

inference_hz=100
target_hz=200
control_hz=1000
# PD gains matching OpenDoge training (Kp=20, Kd=0.3 for lightweight 2.2kg robot)
kp=20.0
kd=0.3
safe_kd=2.0
# Action scale matching training PdControlConfig.action_scale=0.5
action_scale=0.50
state_timeout_s=0.02
over_temperature_c=80.0
fault_poll_hz=10

# Position control startup: ramp kp/kd from damping to full PD over N seconds
pc_startup_ramp_s=2.0
# Max allowed joint deviation from default_pos at startup (rad). Faults if exceeded.
pc_startup_max_deviation=0.25

# max_position_step is applied at 200 Hz.
# 0.015 rad/step = 3 rad/s target slew limit.

# Physical joint limits from OpenDoge URDF.
# Hip: FL/RL [-0.785, 0.26], FR/RR [-0.26, 0.785]
# Thigh: [-0.785, 1.134]
# Calf: [-2.68, -1.04] (always bent >= 60°)

joint.FL_hip_joint.direction=1
joint.FL_hip_joint.offset=0
joint.FL_hip_joint.lower=-0.785
joint.FL_hip_joint.upper=0.26
joint.FL_hip_joint.max_position_step=0.015

joint.FL_thigh_joint.direction=1
joint.FL_thigh_joint.offset=0
joint.FL_thigh_joint.lower=-0.785
joint.FL_thigh_joint.upper=1.134
joint.FL_thigh_joint.max_position_step=0.015

joint.FL_calf_joint.direction=1
joint.FL_calf_joint.offset=0
joint.FL_calf_joint.lower=-2.68
joint.FL_calf_joint.upper=-1.04
joint.FL_calf_joint.max_position_step=0.015

joint.FR_hip_joint.direction=1
joint.FR_hip_joint.offset=0
joint.FR_hip_joint.lower=-0.26
joint.FR_hip_joint.upper=0.785
joint.FR_hip_joint.max_position_step=0.015

joint.FR_thigh_joint.direction=1
joint.FR_thigh_joint.offset=0
joint.FR_thigh_joint.lower=-0.785
joint.FR_thigh_joint.upper=1.134
joint.FR_thigh_joint.max_position_step=0.015

joint.FR_calf_joint.direction=1
joint.FR_calf_joint.offset=0
joint.FR_calf_joint.lower=-2.68
joint.FR_calf_joint.upper=-1.04
joint.FR_calf_joint.max_position_step=0.015

joint.RL_hip_joint.direction=1
joint.RL_hip_joint.offset=0
joint.RL_hip_joint.lower=-0.785
joint.RL_hip_joint.upper=0.26
joint.RL_hip_joint.max_position_step=0.015

joint.RL_thigh_joint.direction=1
joint.RL_thigh_joint.offset=0
joint.RL_thigh_joint.lower=-0.785
joint.RL_thigh_joint.upper=1.134
joint.RL_thigh_joint.max_position_step=0.015

joint.RL_calf_joint.direction=1
joint.RL_calf_joint.offset=0
joint.RL_calf_joint.lower=-2.68
joint.RL_calf_joint.upper=-1.04
joint.RL_calf_joint.max_position_step=0.015

joint.RR_hip_joint.direction=1
joint.RR_hip_joint.offset=0
joint.RR_hip_joint.lower=-0.26
joint.RR_hip_joint.upper=0.785
joint.RR_hip_joint.max_position_step=0.015

joint.RR_thigh_joint.direction=1
joint.RR_thigh_joint.offset=0
joint.RR_thigh_joint.lower=-0.785
joint.RR_thigh_joint.upper=1.134
joint.RR_thigh_joint.max_position_step=0.015

joint.RR_calf_joint.direction=1
joint.RR_calf_joint.offset=0
joint.RR_calf_joint.lower=-2.68
joint.RR_calf_joint.upper=-1.04
joint.RR_calf_joint.max_position_step=0.015

# ── Safety monitoring thresholds ──────────────────────────
# Sustained torque exceedance (Nm, seconds)
torque_threshold=3.0
torque_timeout_s=0.5
# Joint tracking error (rad, seconds) — only Active/LowGainTest
tracking_error_threshold=0.5
tracking_error_timeout_s=0.3
# Stale command file detection (seconds)
command_timeout_s=0.5
# IMU-based fall detection (gravity.z threshold, timeout)
fall_gravity_z_threshold=0.3
fall_timeout_s=0.3
# WaitFeedback overall timeout (0 = no timeout)
feedback_wait_timeout_s=5.0
# Early temperature warning threshold (C)
temp_warn_c=65.0
# IMU consecutive invalid reads before dropping to Ready (debounce)
imu_debounce_count=10

# ── Command processing ────────────────────────────────────
# EMA smoothing alpha: 0=disabled, 0.05-0.2 for real use
command_smoothing_alpha=0.0
